<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e6b43"/>
      <stop offset="1" stop-color="#0c2e1a"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="64" y1="22" x2="64" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="126" height="126" rx="25.5" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Shield shape -->
  <path d="M64 22 L96 37 L96 67 Q96 94 64 108 Q32 94 32 67 L32 37 Z"
    fill="url(#shield-fill)"
    stroke="rgba(255,255,255,0.30)"
    stroke-width="2"
    stroke-linejoin="round"
  />

  <!-- Checkmark — bold, centered in shield -->
  <path d="M46 66 L58 78 L83 52"
    stroke="white"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />
</svg>
