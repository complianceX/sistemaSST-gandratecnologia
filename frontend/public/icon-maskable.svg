<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none">
  <!-- Maskable: full bleed background, safe zone = central 80% -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e6b43"/>
      <stop offset="1" stop-color="#0c2e1a"/>
    </linearGradient>
    <linearGradient id="sf" x1="256" y1="130" x2="256" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
  </defs>
  <!-- Full bleed — no border radius for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Shield inset within safe zone (>10% padding each side) -->
  <path d="M256 130 L360 178 L360 278 Q360 362 256 400 Q152 362 152 278 L152 178 Z"
    fill="url(#sf)"
    stroke="rgba(255,255,255,0.28)"
    stroke-width="7"
    stroke-linejoin="round"
  />
  <path d="M196 276 L238 318 L328 228"
    stroke="white"
    stroke-width="26"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
