<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGS | Sem conexao</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3f8;
        --surface: #ffffff;
        --border: #d5dde8;
        --text: #102033;
        --muted: #5b6b7f;
        --accent: #1e5eff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(30, 94, 255, 0.08), transparent 35%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(480px, 100%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 24px 60px rgba(16, 32, 51, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.75rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: var(--muted);
      }

      a {
        display: inline-block;
        margin-top: 20px;
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sem conexao com o SGS</h1>
      <p>
        Esta tela aparece quando o sistema nao consegue carregar uma rota online com
        seguranca. Reconecte a internet e atualize a pagina para receber a versao mais
        recente do sistema.
      </p>
      <a href="/login">Voltar para o login</a>
    </main>
  </body>
</html>
