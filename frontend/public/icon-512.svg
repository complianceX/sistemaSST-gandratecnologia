<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f39"/>
      <stop offset="100%" stop-color="#081326"/>
    </linearGradient>
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3557"/>
      <stop offset="100%" stop-color="#122340"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feFlood flood-color="#10B981" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="offset" operator="in" result="shadow"/>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M256 58 C172 58 100 96 100 148 V268 C100 352 180 422 256 448 C332 422 412 352 412 268 V148 C412 96 340 58 256 58 Z"
        fill="url(#shield-fill)"/>
  <!-- Shield border -->
  <path d="M256 58 C172 58 100 96 100 148 V268 C100 352 180 422 256 448 C332 422 412 352 412 268 V148 C412 96 340 58 256 58 Z"
        fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="12" stroke-linejoin="round"/>

  <!-- Green X -->
  <path d="M186 186 L326 326 M326 186 L186 326"
        stroke="#10B981" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow)"/>
</svg>
