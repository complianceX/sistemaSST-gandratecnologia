services:
  postgres-test:
    image: postgres:16-alpine
    container_name: sgs-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: sst_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sst_test']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: sgs-redis-test
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_test_data:/data

  clamav-test:
    image: clamav/clamav:stable
    container_name: sgs-clamav-test
    ports:
      - '3310:3310'

volumes:
  postgres_test_data:
  redis_test_data:
