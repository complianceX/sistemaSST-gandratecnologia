global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'wanderson-gandra-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Application metrics
  - job_name: 'wanderson-gandra-backend'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: 'backend'
          environment: 'production'

  # Worker metrics
  - job_name: 'wanderson-gandra-worker'
    scrape_interval: 10s
    static_configs:
      - targets: ['host.docker.internal:9465']
        labels:
          service: 'worker'
          environment: 'production'

  # Node exporter (if available)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
