version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: sst_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sst_redis
    # volatile-lru: remove keys with TTL when maxmemory is reached.
    # Protects rate-limit counters and session keys (which have no TTL) from eviction.
    # maxmemory should be tuned to your Render/instance memory limits.
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-sgs-local-redis}
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
      --save ""
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sst_api
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-sgs-local-redis}
      REDIS_TLS: "false"
      NODE_ENV: ${NODE_ENV}
      UV_THREADPOOL_SIZE: "64"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: sst_worker
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-sgs-local-redis}
      REDIS_TLS: "false"
      NODE_ENV: ${NODE_ENV}
      UV_THREADPOOL_SIZE: "64"

volumes:
  postgres_data:
