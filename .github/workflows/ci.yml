name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint/Test/Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint backend
        run: npm run lint

      - name: Test backend
        run: npm run test:ci

      - name: Build backend
        run: npm run build

      - name: Validate migrations
        run: npm run ci:migration:check

  frontend:
    name: Frontend Lint/Test/Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: https://api.example.test
      NEXT_PUBLIC_APP_URL: https://app.example.test
      NEXT_PUBLIC_SITE_URL: https://app.example.test
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Test frontend
        run: npm run test:ci

      - name: Build frontend
        run: npm run build
