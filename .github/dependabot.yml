version: 2
updates:
  # Backend Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    reviewers:
      - "complianceX"
    labels:
      - "dependencies"
      - "backend"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      typeorm:
        patterns:
          - "typeorm"
          - "@types/typeorm"
      aws:
        patterns:
          - "@aws-sdk/*"
      dev-tools:
        dependency-type: "development"
    ignore:
      # Atualizações major de TypeORM requerem migration manual — revisar com cuidado
      - dependency-name: "typeorm"
        update-types: ["version-update:semver-major"]

  # Frontend Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    reviewers:
      - "complianceX"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react*"
      radix-ui:
        patterns:
          - "@radix-ui/*"
      dev-tools:
        dependency-type: "development"
    ignore:
      # Next.js major requer teste manual de compatibilidade
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    reviewers:
      - "complianceX"
    labels:
      - "dependencies"
      - "ci"
