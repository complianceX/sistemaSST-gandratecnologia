services:
  - type: cron
    name: sgs-migrations
    runtime: node
    plan: starter
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    # Roda migrations a cada 10 min no deploy (útil para hot-fix + verify)
    startCommand: npm run migration:run && echo "Migrations completed"
    schedule: "*/10 * * * *"
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-migrations
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_DIRECT_URL
        sync: false

  - type: web
    name: sgs-backend-web
    runtime: node
    # preDeployCommand requer plano pago; em produção este serviço já roda em standard.
    plan: standard
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:web
    healthCheckPath: /health/public
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-backend-web
      - key: PROMETHEUS_PORT
        value: "9464"
      # URL do pooler Supabase (PgBouncer porta 6543) — para queries do app
      - key: DATABASE_URL
        sync: false
      # URL direta Supabase (porta 5432, sem PgBouncer) — para migrations
      # Obter em: Supabase → Settings → Database → Connection string → URI
      - key: DATABASE_DIRECT_URL
        sync: false
      # Migrations agora rodam em cron service separado (sgs-migrations)
      # Se há pending migrations, elas serão executadas automaticamente a cada 10 min
      - key: REQUIRE_NO_PENDING_MIGRATIONS
        value: "false"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sgs-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VALIDATION_TOKEN_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false

  - type: worker
    name: sgs-backend-worker
    runtime: node
    # Render: plano "free" nao esta disponivel para workers/cron/private services.
    plan: starter
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:worker
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-backend-worker
      - key: PROMETHEUS_PORT
        value: "9465"
      # Worker também usa pooler para queries longas (BullMQ jobs)
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_DIRECT_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sgs-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VALIDATION_TOKEN_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false

  - type: keyvalue
    name: sgs-redis
    plan: starter
    # allkeys-lru: quando a memória enche, evicta as chaves menos usadas.
    # noeviction (anterior) causava erros quando o cache ficava cheio —
    # inaceitável para BullMQ (filas perdem jobs) e dashboard cache.
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

envVarGroups:
  - name: sgs-backend-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: LOG_LEVEL
        value: info
      - key: TZ
        value: America/Sao_Paulo

      # Frontend / CORS
      - key: CORS_ALLOWED_ORIGINS
        value: https://app.sgsseguranca.com.br
      - key: FRONTEND_URL
        value: https://app.sgsseguranca.com.br
      - key: API_PUBLIC_URL
        value: https://api.sgsseguranca.com.br
      - key: AUTH_COOKIE_DOMAIN
        value: .sgsseguranca.com.br

      # Segurança / hardening
      - key: REFRESH_CSRF_ENFORCED
        value: "true"
      - key: REFRESH_CSRF_REPORT_ONLY
        value: "false"
      - key: PUBLIC_VALIDATION_LEGACY_COMPAT
        value: "false"
      - key: PUBLIC_VALIDATION_LOG_CONTRACT_USAGE
        value: "true"
      - key: SECURITY_HARDENING_PHASE
        value: phase0

      # Redis hardening (produção)
      - key: REDIS_DISABLED
        value: "false"
      - key: REDIS_FAIL_OPEN
        value: "false"
      - key: REDIS_ALLOW_IN_MEMORY_FALLBACK_IN_PROD
        value: "false"

      # Rate limit / throttler hardening
      - key: THROTTLE_TTL
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: THROTTLER_FAIL_CLOSED_AUTH_ROUTES
        value: "true"
      - key: THROTTLER_STORAGE_FAIL_OPEN
        value: "false"
      - key: THROTTLER_STORAGE_REDIS_TIMEOUT_MS
        value: "200"
      - key: THROTTLER_DECISION_TIMEOUT_MS
        value: "250"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_ENABLED
        value: "true"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_LIMIT
        value: "60"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_TTL_MS
        value: "60000"
      - key: THROTTLER_AUTH_ME_LOCAL_FALLBACK_LIMIT
        value: "1200"
      - key: THROTTLER_AUTH_ME_LOCAL_FALLBACK_TTL_MS
        value: "60000"
      - key: THROTTLER_AUTH_FALLBACK_LOG_COOLDOWN_MS
        value: "15000"

      # Postgres pool por instância + timeouts reais
      # Supabase PgBouncer pooler (porta 6543): app pode ter mais conexões abertas
      # porque o PgBouncer multiplexia para o PostgreSQL.
      # web (free) + worker (starter) = 2 instâncias × 15 = 30 conexões ao pooler.
      # Supabase free tier: pooler suporta até 200 conexões de entrada.
      - key: DB_POOL_MAX
        value: "15"
      # min > 0: pré-aquece conexões — elimina cold-start em picos de tráfego
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      # Mata queries travadas no banco após 25s — protege o pool e o Supabase
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "25000"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_ALLOW_INSECURE
        value: "false"
      # Fallback controlado apenas para bootstrap em host Supabase quando
      # houver erro especifico de cadeia TLS. Mantem o app resiliente sem
      # abrir rejectUnauthorized=false de forma irrestrita.
      - key: DATABASE_SSL_ALLOW_SUPABASE_CERT_FALLBACK
        value: "true"
      # Cloudflare R2 / S3 compat
      - key: AWS_REGION
        value: auto
      - key: GOVERNED_PDF_MAX_FILE_SIZE_BYTES
        value: "52428800"
      - key: PG_STATEMENT_TIMEOUT_MS
        value: "25000"
      - key: PG_LOCK_TIMEOUT_MS
        value: "2000"
      - key: PG_IDLE_IN_TX_TIMEOUT_MS
        value: "15000"

      # Clamp global de paginação
      - key: PAGINATION_LIMIT_MAX
        value: "100"
      - key: PAGINATION_PAGE_MAX
        value: "10000"

      # Proteção do endpoint /reports/jobs (scan limitado)
      - key: REPORTS_QUEUE_SCAN_MAX_PER_STATE
        value: "200"

      # DLQ retention (protege Redis)
      - key: DLQ_MAX_WAITING
        value: "2000"
      - key: DLQ_PRUNE_BATCH
        value: "200"

      # Timeout global HTTP (não cancela IO/DB sozinho)
      - key: REQUEST_TIMEOUT_MS
        value: "30000"

      # Worker heartbeat (monitoramento de runtime de filas)
      - key: WORKER_HEARTBEAT_ENABLED
        value: "true"
      - key: WORKER_HEARTBEAT_REQUIRED
        value: "true"
      - key: WORKER_HEARTBEAT_KEY
        value: worker:heartbeat:queue-runtime
      - key: WORKER_HEARTBEAT_TTL_SECONDS
        value: "90"

      # Migrations (protege contra concorrência web/worker em deploy)
      - key: MIGRATION_ADVISORY_LOCK_TIMEOUT_MS
        value: "300000"
