services:
  - type: cron
    name: sgs-migrations
    runtime: node
    plan: starter
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    # Frequência reduzida de "*/10 * * * *" (a cada 10min) para 1x por dia às 3h UTC.
    # Razão: cron a cada 10min com auto-deploy no branch main significa que qualquer
    # commit malicioso com migration SQL executaria em produção em até 10 minutos,
    # sem qualquer revisão humana. 1x/dia dá tempo para detectar push suspeito.
    # Para deploy urgente: acionar manualmente via Render dashboard.
    # Zera explicitamente DATABASE_DIRECT_URL para impedir que env residual do dashboard
    # sobrescreva a URL Neon validada em DATABASE_URL.
    startCommand: DATABASE_DIRECT_URL='' npm run migration:run && echo "Migrations completed"
    schedule: "0 3 * * *"
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-migrations
      - key: DATABASE_URL
        sync: false
      # DATABASE_DIRECT_URL removida do cron: Neon usa DATABASE_URL como fonte unica
      # para app e migrations enquanto o contrato RLS depende de contexto por sessao.
      - key: SUPABASE_URL
        sync: false
      # service_role_key necessária apenas aqui (migrations precisam bypassar RLS).
      # API web e worker usam DATABASE_URL com role de aplicação, não service_role.
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: web
    name: sgs-backend-web
    runtime: node
    # preDeployCommand garante migrations ANTES de qualquer instância nova receber tráfego.
    # Requer plano paid (standard já é pago). Substitui o cron como mecanismo primário
    # em deploys — o cron permanece como fallback diário para rollbacks/emergências.
    plan: standard
    # DATABASE_MIGRATION_URL usa o role owner/DDL. DATABASE_URL fica reservado
    # para o role runtime sem BYPASSRLS.
    preDeployCommand: DATABASE_DIRECT_URL='' npm run migration:run
    scaling:
      minInstances: 2
      maxInstances: 5
      targetCPUPercent: 60
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:web
    healthCheckPath: /health/public
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-backend-web
      - key: PROMETHEUS_PORT
        value: "9464"
      # URL direta Neon do role runtime sem BYPASSRLS. Nao usar endpoint
      # -pooler enquanto o RLS depender de set_config por sessao.
      - key: DATABASE_URL
        sync: false
      # URL Neon do role owner/DDL, usada apenas por migrations no preDeploy.
      - key: DATABASE_MIGRATION_URL
        sync: false
      # Migrations agora rodam em cron service separado (sgs-migrations)
      # Se há pending migrations, elas serão executadas automaticamente a cada 10 min
      - key: REQUIRE_NO_PENDING_MIGRATIONS
        value: "false"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sgs-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VALIDATION_TOKEN_SECRET
        sync: false
      # Secret dedicado para tokens de download de documentos.
      # Separado do JWT_SECRET: token de download vazado não forja autenticação.
      - key: DOCUMENT_DOWNLOAD_TOKEN_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      # Supabase Auth legado desativado no cutover Neon.
      # SUPABASE_SERVICE_ROLE_KEY removida daqui: a API web não precisa bypassar RLS.
      # Operações que precisavam da service_role foram movidas para o cron de migrations.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: worker
    name: sgs-backend-worker
    runtime: node
    # Render: plano "free" nao esta disponivel para workers/cron/private services.
    plan: starter
    repo: https://github.com/complianceX/sistemaSST-gandratecnologia
    branch: main
    autoDeployTrigger: commit
    rootDir: backend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:worker
    envVars:
      - fromGroup: sgs-backend-common
      - key: OTEL_SERVICE_NAME
        value: sgs-backend-worker
      - key: PROMETHEUS_PORT
        value: "9465"
      # Worker usa a mesma URL direta Neon quando for reativado.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: sgs-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: VALIDATION_TOKEN_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_ENDPOINT
        sync: false
      # Supabase Auth legado desativado no cutover Neon.
      # SUPABASE_SERVICE_ROLE_KEY removida: worker não precisa bypassar RLS.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false

  - type: keyvalue
    name: sgs-redis
    plan: starter
    # volatile-lru: evicta apenas chaves COM TTL definido quando a memória enche.
    # Chaves sem TTL (blacklist de tokens revogados, bloqueios de brute-force) NUNCA
    # são evictadas. Isso é crítico: allkeys-lru poderia remover um token revogado
    # e reativar uma sessão após logout, ou remover um bloqueio de brute-force ativo.
    maxmemoryPolicy: volatile-lru
    ipAllowList: []

envVarGroups:
  - name: sgs-backend-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: LOG_LEVEL
        value: info
      - key: TZ
        value: America/Sao_Paulo

      # Frontend / CORS
      - key: CORS_ALLOWED_ORIGINS
        value: https://app.sgsseguranca.com.br
      - key: FRONTEND_URL
        value: https://app.sgsseguranca.com.br
      - key: API_PUBLIC_URL
        value: https://api.sgsseguranca.com.br
      - key: AUTH_COOKIE_DOMAIN
        value: .sgsseguranca.com.br

      # Auth local legado mantido; Supabase Auth sync desativado no cutover Neon.
      # LEGACY_PASSWORD_AUTH_ENABLED=true: permite login via senha local (users.password)
      # enquanto os usuários ainda não foram migrados para auth.users do Supabase.
      # Fluxo: login local funciona → senha é sincronizada com Supabase Auth em background.
      # Após confirmar que todos os usuários têm auth_user_id e encrypted_password,
      # mudar para "false" para completar o cutover definitivo.
      # Verificar com: node backend/scripts/audit-supabase-auth-cutover.js
      - key: LEGACY_PASSWORD_AUTH_ENABLED
        value: "true"
      - key: SUPABASE_AUTH_SYNC_ENABLED
        value: "false"
      - key: SUPABASE_PASSWORD_SYNC_ON_LOCAL_LOGIN
        value: "false"

      # Segurança / hardening
      - key: REFRESH_CSRF_ENFORCED
        value: "true"
      - key: REFRESH_CSRF_REPORT_ONLY
        value: "false"
      - key: PUBLIC_VALIDATION_LEGACY_COMPAT
        value: "false"
      - key: PUBLIC_VALIDATION_LOG_CONTRACT_USAGE
        value: "true"
      - key: SECURITY_HARDENING_PHASE
        value: phase0

      # Redis hardening (produção)
      - key: REDIS_DISABLED
        value: "false"
      - key: REDIS_FAIL_OPEN
        value: "false"
      - key: REDIS_ALLOW_IN_MEMORY_FALLBACK_IN_PROD
        value: "false"

      # Rate limit / throttler hardening
      - key: THROTTLE_TTL
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: THROTTLER_FAIL_CLOSED_AUTH_ROUTES
        value: "true"
      - key: THROTTLER_STORAGE_FAIL_OPEN
        value: "false"
      - key: THROTTLER_STORAGE_REDIS_TIMEOUT_MS
        value: "200"
      - key: THROTTLER_DECISION_TIMEOUT_MS
        value: "250"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_ENABLED
        value: "true"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_LIMIT
        value: "60"
      - key: THROTTLER_AUTH_LOCAL_FALLBACK_TTL_MS
        value: "60000"
      - key: THROTTLER_AUTH_ME_LOCAL_FALLBACK_LIMIT
        value: "1200"
      - key: THROTTLER_AUTH_ME_LOCAL_FALLBACK_TTL_MS
        value: "60000"
      - key: THROTTLER_AUTH_FALLBACK_LOG_COOLDOWN_MS
        value: "15000"

      # Postgres pool por instancia + timeouts reais.
      # Neon direto: manter pool conservador por instancia ate validar endpoint
      # pooled com o contrato RLS/session context.
      - key: DB_POOL_MAX
        value: "4"
      # Pre-aquecimento minimo para evitar abrir conexoes demais em bootstrap,
      # migrations e jobs concorrentes.
      - key: DB_POOL_MIN
        value: "1"
      - key: DB_IDLE_TIMEOUT_MS
        value: "30000"
      - key: DB_CONNECTION_TIMEOUT_MS
        value: "10000"
      # Mata queries travadas no banco apos 25s; protege o pool e o Neon.
      - key: DB_STATEMENT_TIMEOUT_MS
        value: "25000"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_ALLOW_INSECURE
        value: "false"
      - key: DATABASE_SSL_ALLOW_SUPABASE_CERT_FALLBACK
        value: "false"
      # Cloudflare R2 / S3 compat
      - key: AWS_REGION
        value: auto
      - key: GOVERNED_PDF_MAX_FILE_SIZE_BYTES
        value: "52428800"
      - key: PG_STATEMENT_TIMEOUT_MS
        value: "25000"
      - key: PG_LOCK_TIMEOUT_MS
        value: "2000"
      - key: PG_IDLE_IN_TX_TIMEOUT_MS
        value: "15000"

      # Clamp global de paginação
      - key: PAGINATION_LIMIT_MAX
        value: "100"
      - key: PAGINATION_PAGE_MAX
        value: "10000"

      # Dashboard documental: manter carga sob demanda no banco e evitar
      # concorrência de aquecimento em background até nova calibração de pool.
      - key: DASHBOARD_DOCUMENT_AVAILABILITY_WARMUP_ENABLED
        value: "false"
      - key: DASHBOARD_DOCUMENT_AVAILABILITY_SCHEDULER_ENABLED
        value: "false"

      # Proteção do endpoint /reports/jobs (scan limitado)
      - key: REPORTS_QUEUE_SCAN_MAX_PER_STATE
        value: "200"

      # DLQ retention (protege Redis)
      - key: DLQ_MAX_WAITING
        value: "2000"
      - key: DLQ_PRUNE_BATCH
        value: "200"

      # Timeout global HTTP (não cancela IO/DB sozinho)
      - key: REQUEST_TIMEOUT_MS
        value: "30000"

      # Worker heartbeat (monitoramento de runtime de filas)
      - key: WORKER_HEARTBEAT_ENABLED
        value: "true"
      - key: WORKER_HEARTBEAT_REQUIRED
        value: "true"
      - key: WORKER_HEARTBEAT_KEY
        value: worker:heartbeat:queue-runtime
      - key: WORKER_HEARTBEAT_TTL_SECONDS
        value: "90"

      # Migrations (protege contra concorrência web/worker em deploy)
      - key: MIGRATION_ADVISORY_LOCK_TIMEOUT_MS
        value: "300000"

      # LGPD / Retenção de dados de IA
      # Histórico de interações com IA purgado após 90 dias para conformidade LGPD.
      # O worker de document-retention usa esta variável para agendar purge automático.
      - key: AI_HISTORY_MAX_DAYS
        value: "90"

      # Sentry — error tracking em produção
      # AÇÃO NECESSÁRIA: preencher o valor de SENTRY_DSN no Render dashboard
      # (Settings → Environment Groups → sgs-backend-common → SENTRY_DSN)
      - key: SENTRY_DSN
        sync: false
